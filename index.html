<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WhatsApp Private Clone</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    .bg-wa-green { background-color: #008069; }
    .bg-wa-chat { background-color: #efeae2; }
    .bg-wa-bubble-out { background-color: #d9fdd3; }
    
    /* Perbaikan tinggi presisi untuk mobile safari/chrome */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-gray-200 flex items-center justify-center font-sans antialiased h-full w-full">

  <div id="login-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white p-6 rounded-lg shadow-xl w-full max-w-sm">
      <div class="text-center mb-6">
        <i class="fa-brands fa-whatsapp text-emerald-600 text-5xl mb-2"></i>
        <h2 class="text-xl font-bold text-gray-800">Masuk ke WhatsApp</h2>
        <p class="text-xs text-gray-500">Gunakan username & password Anda</p>
      </div>
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Username</label>
          <input type="text" id="login-user" class="w-full border border-gray-300 rounded p-2 text-sm focus:outline-none focus:border-emerald-600" placeholder="Masukkan username">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1">Password</label>
          <input type="password" id="login-pass" class="w-full border border-gray-300 rounded p-2 text-sm focus:outline-none focus:border-emerald-600" placeholder="Masukkan password">
        </div>
        <p id="login-error" class="text-xs text-red-500 hidden text-center"></p>
        <button onclick="prosesLogin()" id="btn-login-submit" class="w-full bg-emerald-600 text-white font-medium py-2 rounded text-sm hover:bg-emerald-700 transition">
          Masuk / Daftar
        </button>
      </div>
    </div>
  </div>

  <div id="call-modal" class="fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-50 hidden p-2 md:p-4">
    <div class="bg-gray-900 w-full h-full md:h-auto md:max-w-3xl md:aspect-video rounded-none md:rounded-lg overflow-hidden shadow-2xl relative flex flex-col">
      <div class="relative w-full flex-grow bg-black flex items-center justify-center overflow-hidden">
        <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
        <video id="local-video" autoplay playsinline muted class="absolute bottom-4 right-4 w-1/3 max-w-[120px] aspect-video rounded-md border-2 border-white object-cover shadow-lg bg-gray-800"></video>
      </div>
      <div class="bg-gray-800 p-4 flex justify-between items-center text-white shrink-0">
        <div class="flex flex-col">
          <span id="call-status" class="text-xs md:text-sm font-medium text-emerald-400">Connecting...</span>
          <span id="call-type" class="text-[10px] md:text-xs text-gray-400">Panggilan</span>
        </div>
        <div class="flex gap-2">
          <button onclick="toggleMuteAudio()" id="btn-mute-audio" class="bg-gray-700 hover:bg-gray-600 p-2 rounded-full w-10 h-10 transition">
            <i class="fa-solid fa-microphone"></i>
          </button>
          <button onclick="akhiriPanggilan()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition flex items-center gap-1.5">
            <i class="fa-solid fa-phone-slash"></i> Akhiri
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="app-container" class="w-full h-full md:max-w-6xl md:h-[92vh] bg-white flex rounded-none md:rounded-lg shadow-lg overflow-hidden hidden mobile-wrapper">
    
    <aside id="sidebar-kontak" class="w-full md:w-1/3 border-r border-gray-200 flex flex-col bg-white h-full shrink-0">
      <div class="bg-gray-100 p-4 flex items-center justify-between border-b border-gray-200 shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-emerald-600 rounded-full flex items-center justify-center text-white font-bold text-sm" id="avatar-saya">Y</div>
          <div>
            <h2 class="font-bold text-sm text-gray-800 line-clamp-1" id="nama-saya">Memuat...</h2>
            <p class="text-[11px] text-emerald-600 font-medium">Online</p>
          </div>
        </div>
        <button onclick="logout()" class="text-gray-500 hover:text-red-600 p-2 rounded transition" title="Keluar">
          <i class="fa-solid fa-right-from-bracket text-base"></i>
        </button>
      </div>
      <div class="flex-grow overflow-y-auto" id="list-kontak">
        <p class="text-center text-gray-400 text-xs p-4">Memuat daftar kontak...</p>
      </div>
    </aside>

    <main id="main-chat" class="hidden md:flex w-full md:w-2/3 flex-col bg-wa-chat relative h-full">
      
      <div id="no-chat-screen" class="absolute inset-0 bg-gray-50 flex flex-col items-center justify-center p-6 text-center z-10 hidden md:flex">
        <i class="fa-solid fa-comments text-gray-300 text-7xl mb-4"></i>
        <h3 class="text-xl font-medium text-gray-700">WhatsApp Web Private</h3>
        <p class="text-gray-500 text-xs mt-1 max-w-sm">Pilih kontak di sebelah kiri untuk mulai mengobrol.</p>
      </div>

      <header class="bg-gray-100 px-3 py-3 flex items-center justify-between border-b border-gray-200 shrink-0 z-20 shadow-sm">
        <div class="flex items-center gap-2">
          <button onclick="kembaliKeDaftarKontak()" class="block md:hidden text-gray-600 hover:text-emerald-700 pr-1 text-lg">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          
          <div class="w-9 h-9 bg-gray-400 rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0" id="avatar-target">?</div>
          <div>
            <h2 class="font-bold text-sm text-gray-800 line-clamp-1" id="nama-target">Nama Kontak</h2>
            <p class="text-[10px] text-emerald-600">terhubung privat</p>
          </div>
        </div>
        
        <div class="flex items-center gap-4 text-gray-600 pr-1">
          <button onclick="mulaiPanggilan(false)" class="hover:text-emerald-700 transition" title="Panggilan Suara">
            <i class="fa-solid fa-phone text-base"></i>
          </button>
          <button onclick="mulaiPanggilan(true)" class="hover:text-emerald-700 transition" title="Panggilan Video">
            <i class="fa-solid fa-video text-base"></i>
          </button>
        </div>
      </header>

      <div id="chat-box" class="flex-grow overflow-y-auto p-4 space-y-3 flex flex-col bg-wa-chat"></div>

      <footer class="bg-gray-100 px-3 py-2 flex items-center gap-2 border-t border-gray-200 shrink-0 relative">
        <input type="file" id="input-file" class="hidden" onchange="unggahDanKirimFile(this)">
        <button onclick="document.getElementById('input-file').click()" id="btn-lampiran" class="text-gray-500 hover:text-emerald-700 transition w-9 h-9 flex items-center justify-center shrink-0" title="Kirim Berkas">
          <i class="fa-solid fa-paperclip text-lg"></i>
        </button>
        <input type="text" id="input-pesan" placeholder="Ketik pesan..." class="flex-grow bg-white py-2 px-3 rounded-lg text-sm focus:outline-none placeholder-gray-400 shadow-sm" onkeypress="cekEnter(event)">
        <button id="btn-kirim" onclick="kirimPesan()" class="bg-wa-green text-white w-9 h-9 rounded-full flex items-center justify-center shadow hover:bg-emerald-800 transition shrink-0">
          <i class="fa-solid fa-paper-plane text-xs ml-0.5"></i>
        </button>
      </footer>
    </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyxfwqXaReK8TerSeXz9-LpvhhymTuS5es1ehsqSTTkKqE1_Ia3MW8vCEgF9-wqFxTx/exec";

    let akunSaya = "";
    let kontakAktif = "";
    let intervalOtomatis = null;
    let peerConnection = null;
    let localStream = null;
    let sedangDalamPanggilan = false;
    let jenisPanggilanGlobal = "video"; 
    let iceCandidatesAntrian = [];

    const konfigurasiRTC = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    };

    async function panggilAPI(fungsi, parameterArray) {
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({ fungsi: fungsi, args: parameterArray })
        });
        return await response.json();
      } catch (err) {
        console.error("API Error:", err);
        return { status: "gagal" };
      }
    }

    async function prosesLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value.trim();
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('btn-login-submit');

      if (!user || !pass) {
        errorEl.innerText = "Username dan Password wajib diisi!";
        errorEl.classList.remove('hidden');
        return;
      }

      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerText = "Memverifikasi...";

      const respon = await panggilAPI("loginUser", [user, pass]);
      btn.disabled = false;
      btn.innerText = "Masuk / Daftar";

      if (respon && respon.status === "sukses") {
        akunSaya = respon.username;
        document.getElementById('login-modal').classList.add('hidden');
        document.getElementById('app-container').classList.remove('hidden');
        document.getElementById('nama-saya').innerText = akunSaya;
        document.getElementById('avatar-saya').innerText = akunSaya.charAt(0).toUpperCase();

        refreshDaftarKontak();
        intervalOtomatis = setInterval(loopDataOtomatis, 3000);
      } else {
        errorEl.innerText = respon.pesan || "Terjadi kesalahan.";
        errorEl.classList.remove('hidden');
      }
    }

    function logout() {
      if (intervalOtomatis) clearInterval(intervalOtomatis);
      akunSaya = "";
      kontakAktif = "";
      document.getElementById('login-user').value = "";
      document.getElementById('login-pass').value = "";
      kembaliKeDaftarKontak();
      document.getElementById('app-container').classList.add('hidden');
      document.getElementById('login-modal').classList.remove('hidden');
    }

    async function loopDataOtomatis() {
      if (!akunSaya) return;
      
      // Kirim sinyal ping ke server bahwa kita sedang aktif/online
      panggilAPI("perbaruiStatusOnline", [akunSaya]);
      
      refreshDaftarKontak();
      
      if (kontakAktif !== "") {
        muatPesanChat(false);
      }
      if (sedangDalamPanggilan) {
        cekSinyalBalasanMasuk();
      }
    }

    async function refreshDaftarKontak() {
      // Sekarang API mengembalikan Array of Object [{nama, online, terakhirAktivitas}]
      const daftar = await panggilAPI("ambilKontak", [akunSaya]);
      renderKontak(daftar || []);
    }

    function renderKontak(daftarKontak) {
      const listEl = document.getElementById('list-kontak');
      listEl.innerHTML = "";
      if (daftarKontak.length === 0) {
        listEl.innerHTML = `<p class="text-center text-gray-400 text-xs p-4">Belum ada user lain terdaftar.</p>`;
        return;
      }
      
      daftarKontak.forEach(user => {
        const item = document.createElement('div');
        const isAktif = user.nama === kontakAktif;
        
        // Indikator Titik Hijau / Abu-abu untuk status online
        const badgeStatus = user.online 
          ? `<span class="w-2.5 h-2.5 bg-emerald-500 rounded-full border border-white block absolute bottom-0 right-0"></span>`
          : `<span class="w-2.5 h-2.5 bg-gray-400 rounded-full border border-white block absolute bottom-0 right-0"></span>`;
          
        const teksStatus = user.online 
          ? `<span class="text-xs text-emerald-600 font-medium">Online</span>` 
          : `<span class="text-xs text-gray-400">Offline</span>`;

        // Update status sub-header chat secara real-time jika kontak ini sedang kita buka
        if (isAktif) {
          const subHeader = document.querySelector("#main-chat header p");
          if (subHeader) {
            subHeader.innerText = user.online ? "Online" : "Offline";
            subHeader.className = user.online ? "text-[10px] text-emerald-600 font-medium" : "text-[10px] text-gray-400";
          }
        }

        item.className = `flex items-center gap-3 p-3 cursor-pointer border-b border-gray-100 transition ${isAktif ? 'bg-gray-100' : 'hover:bg-gray-50'}`;
        item.onclick = () => pilihKontakMembukaChat(user.nama, user.online);
        item.innerHTML = `
          <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0 relative">
            ${user.nama.charAt(0).toUpperCase()}
            ${badgeStatus}
          </div>
          <div class="flex-grow overflow-hidden">
            <div class="flex justify-between items-center">
              <h4 class="font-semibold text-sm text-gray-800 truncate">${user.nama}</h4>
            </div>
            <p class="truncate">${teksStatus}</p>
          </div>`;
        listEl.appendChild(item);
      });
    }

    function pilihKontakMembukaChat(namaTarget, apakahOnline) {
      kontakAktif = namaTarget;
      document.getElementById('nama-target').innerText = kontakAktif;
      document.getElementById('avatar-target').innerText = kontakAktif.charAt(0).toUpperCase();
      
      // Mengatur sub-header nama di room chat awal
      const subHeader = document.querySelector("#main-chat header p");
      if (subHeader) {
        subHeader.innerText = apakahOnline ? "Online" : "Offline";
        subHeader.className = apakahOnline ? "text-[10px] text-emerald-600 font-medium" : "text-[10px] text-gray-400";
      }
      
      document.getElementById('sidebar-kontak').classList.add('hidden', 'md:flex');
      const mainChat = document.getElementById('main-chat');
      mainChat.classList.remove('hidden');
      mainChat.classList.add('flex');

      const noChatScreen = document.getElementById('no-chat-screen');
      if(noChatScreen) noChatScreen.classList.add('md:hidden');

      muatPesanChat(true);
    }

    async function muatPesanChat(forceScroll) {
      if (kontakAktif === "") return;
      const dataPesan = await panggilAPI("ambilPesanPribadi", [akunSaya, kontakAktif]);
      renderPesan(dataPesan || [], forceScroll);
    }

    // Navigasi Kembali ke List Kontak (Presisi Mobile)
    function kembaliKeDaftarKontak() {
      kontakAktif = "";
      document.getElementById('sidebar-kontak').classList.remove('hidden');
      const mainChat = document.getElementById('main-chat');
      mainChat.classList.add('hidden');
      mainChat.classList.remove('flex');
    }


    function renderPesan(daftarPesan, forceScroll) {
      const chatBox = document.getElementById('chat-box');
      const isScrolled = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 80;
      chatBox.innerHTML = "";

      daftarPesan.forEach(msg => {
        if (msg.teks === "[PESAN_DIHAPUS]") return;
        const sayaYangKirim = msg.pengirim.toLowerCase() === akunSaya.toLowerCase();
        
        // ====================================================================
        // PERBAIKAN: Proteksi agar Pop-up Panggilan Masuk Tidak Muncul Terus
        // ====================================================================
        if (msg.teks.startsWith("CALL_INVITE:") && !sayaYangKirim && !sedangDalamPanggilan) {
          
          // Ambil waktu pesan dikirim (Asumsi format dari backend adalah objek date atau string waktu)
          // Kita proteksi menggunakan batasan waktu: Hanya terima jika pesan berumur kurang dari 12 detik
          let waktuPesanValid = true;
          
          if (msg.timestamp) { // Jika backend mengirimkan UNIX timestamp (milidetik)
            const waktuSekarang = new Date().getTime();
            if (waktuSekarang - msg.timestamp > 12000) { 
              waktuPesanValid = false; // Abaikan jika undangan telepon sudah kadaluarsa (lebih dari 12 detik)
            }
          } else if (msg.waktu) {
            // Pengaman alternatif jika hanya ada string "HH:mm"
            // Mengingat presisi menit, kita buat batasan logis di tingkat client menggunakan state session global
            if (!window.panggilanTerlewati) window.panggilanTerlewati = [];
            const idPanggilanUnik = msg.pengirim + "_" + msg.waktu;
            
            if (window.panggilanTerlewati.includes(idPanggilanUnik)) {
              waktuPesanValid = false; // Sudah pernah ditolak/diakhiri sebelumnya
            }
          }

          if (waktuPesanValid) {
            const detailPanggilan = msg.teks.split("|");
            const pakeVideo = detailPanggilan[2] === "true";
            sedangDalamPanggilan = true;
            
            // Simpan ID panggilan agar tidak berulang memicu konfirmasi yang sama
            if (!window.panggilanTerlewati) window.panggilanTerlewati = [];
            const idCall = msg.pengirim + "_" + (msg.waktu || "");
            window.panggilanTerlewati.push(idCall);

            if (confirm(`Menerima panggilan ${pakeVideo ? 'Video' : 'Suara'} dari ${msg.pengirim}?`)) {
              terimaPanggilanWebRTC(msg.pengirim, pakeVideo);
            } else {
              akhiriPanggilan(); // Kirim sinyal END jika ditolak
            }
          }
        }
        // ====================================================================

        if (msg.teks.startsWith("WEBRTC_SIGNAL:")) return;

        const wrapper = document.createElement('div');
        wrapper.className = `flex w-full group ${sayaYangKirim ? 'justify-end' : 'justify-start'}`;

        const bubble = document.createElement('div');
        bubble.className = `max-w-[85%] md:max-w-[75%] rounded-lg p-2 shadow-sm text-sm relative ${sayaYangKirim ? 'bg-wa-bubble-out rounded-tr-none' : 'bg-white rounded-tl-none'}`;

        let isiKonten = "";
        if (msg.teks.startsWith("https://drive.google.com/")) {
          const namaFileKecil = msg.teks.toLowerCase();
          const apakahGambar = [".jpg", ".jpeg", ".png", ".gif", ".webp"].some(ext => namaFileKecil.includes(ext));
          if (apakahGambar) {
            isiKonten = `<div class="mb-1"><img src="${msg.teks}" class="max-w-full max-h-48 rounded shadow-sm object-cover bg-gray-100" alt="Foto"></div><a href="${msg.teks}" target="_blank" class="text-blue-600 hover:underline font-medium text-xs block mt-1"><i class="fa-solid fa-download mr-1"></i> Unduh Foto</a>`;
          } else {
            isiKonten = `<div class="flex items-center gap-2 bg-black/5 p-2 rounded border border-black/10 mb-1"><i class="fa-solid fa-file-lines text-gray-500 text-xl"></i><div class="overflow-hidden"><p class="text-xs font-semibold text-gray-700 truncate max-w-[130px]">File Dokumen</p><a href="${msg.teks}" target="_blank" class="text-emerald-700 hover:underline text-[11px] font-bold block">Download</a></div></div>`;
          }
        } else if (msg.teks.startsWith("CALL_INVITE:")) {
          const isVideo = msg.teks.includes("|true");
          isiKonten = `<p class="italic text-gray-500 flex items-center gap-1 text-xs"><i class="fa-solid ${isVideo ? 'fa-video' : 'fa-phone'}"></i> Panggilan ${isVideo ? 'Video' : 'Suara'}</p>`;
        } else {
          isiKonten = `<p class="pr-10 break-words">${msg.teks}</p>`;
        }

        const formatJamSaja = msg.waktu ? msg.waktu.substring(0, 5) : "--:--";

        let tombolHapusHtml = "";
        if (sayaYangKirim && !msg.teks.startsWith("CALL_INVITE:")) {
          const teksAmanB64 = btoa(unescape(encodeURIComponent(msg.teks)));
          tombolHapusHtml = `<button onclick="prosesHapusPesan('${msg.pengirim}', '${msg.penerima}', '${teksAmanB64}', '${msg.waktu}')" class="opacity-0 group-hover:opacity-100 md:opacity-0 text-gray-400 hover:text-red-500 absolute top-1 right-1 text-xs p-1 transition-opacity duration-200" title="Hapus"><i class="fa-solid fa-trash-can"></i></button>`;
        }

        bubble.innerHTML = `${tombolHapusHtml}${isiKonten}<span class="absolute bottom-0.5 right-1.5 text-[9px] text-gray-400 flex items-center gap-0.5 ml-4">${formatJamSaja}${sayaYangKirim ? '<i class="fa-solid fa-check-double text-sky-500"></i>' : ''}</span>`;
        wrapper.appendChild(bubble);
        chatBox.appendChild(wrapper);
      });

      if (forceScroll || isScrolled) chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function prosesHapusPesan(pengirim, penerima, teksB64, waktu) {
      if (!confirm("Hapus pesan ini?")) return;
      const teksAsli = decodeURIComponent(escape(atob(teksB64)));
      const status = await panggilAPI("hapusPesanPribadi", [pengirim, penerima, teksAsli, waktu]);
      if (status === "Sukses") muatPesanChat(false);
    }

    async function mulaiPanggilan(denganVideo) {
      if (kontakAktif === "" || sedangDalamPanggilan) return;
      sedangDalamPanggilan = true;
      jenisPanggilanGlobal = denganVideo ? "video" : "audio";

      document.getElementById('call-modal').classList.remove('hidden');
      document.getElementById('call-type').innerText = denganVideo ? "Panggilan Video P2P" : "Panggilan Suara P2P";
      document.getElementById('call-status').innerText = "Memanggil...";

      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: denganVideo, audio: true });
        document.getElementById('local-video').srcObject = localStream;
        buatPeerConnection();

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        panggilAPI("kirimPesanPribadi", [akunSaya, kontakAktif, `CALL_INVITE:|KamarWebRTC|${denganVideo}`]);
        panggilAPI("kirimSinyalWebRTC", [akunSaya, kontakAktif, "OFFER", JSON.stringify(offer)]);
      } catch (err) {
        akhiriPanggilan();
      }
    }

    async function terimaPanggilanWebRTC(namaPenelpon, denganVideo) {
      jenisPanggilanGlobal = denganVideo ? "video" : "audio";
      document.getElementById('call-modal').classList.remove('hidden');
      document.getElementById('call-type').innerText = denganVideo ? "Panggilan Video P2P" : "Panggilan Suara P2P";
      document.getElementById('call-status').innerText = "Menghubungkan...";

      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: denganVideo, audio: true });
        document.getElementById('local-video').srcObject = localStream;
        buatPeerConnection();

        ambilSinyalTerakhirDariSheet(namaPenelpon, akunSaya, "OFFER", async (dataOffer) => {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(dataOffer));
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          panggilAPI("kirimSinyalWebRTC", [akunSaya, namaPenelpon, "ANSWER", JSON.stringify(answer)]);
          prosesAntrianIce();
          DengarkanSinyalIceBerkala(namaPenelpon);
        });
      } catch (err) {
        akhiriPanggilan();
      }
    }

    function buatPeerConnection() {
      peerConnection = new RTCPeerConnection(konfigurasiRTC);
      localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

      peerConnection.ontrack = (event) => {
        const remoteVideo = document.getElementById('remote-video');
        if (remoteVideo.srcObject !== event.streams[0]) {
          remoteVideo.srcObject = event.streams[0];
          document.getElementById('call-status').innerText = "Terhubung";
        }
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate && kontakAktif !== "") {
          panggilAPI("kirimSinyalWebRTC", [akunSaya, kontakAktif, "ICE", JSON.stringify(event.candidate)]);
        }
      };
    }

    function ambilSinyalTerakhirDariSheet(dari, untuk, jenis, callback) {
      panggilAPI("ambilPesanPribadi", [dari, untuk]).then(dataPesan => {
        if (!dataPesan) return;
        for (let i = dataPesan.length - 1; i >= 0; i--) {
          const msg = dataPesan[i];
          if (msg.pengirim.toLowerCase() === dari.toLowerCase() && msg.penerima.toLowerCase() === untuk.toLowerCase()) {
            if (msg.teks.startsWith(`WEBRTC_SIGNAL:${jenis}|`)) {
              const dataMentahJson = msg.teks.split(`WEBRTC_SIGNAL:${jenis}|`)[1];
              callback(JSON.parse(dataMentahJson));
              break;
            }
          }
        }
      });
    }

    function DengarkanSinyalIceBerkala(lawanBicara) {
      panggilAPI("ambilPesanPribadi", [lawanBicara, akunSaya]).then(dataPesan => {
        if (!dataPesan) return;
        dataPesan.forEach(msg => {
          if (msg.pengirim.toLowerCase() === lawanBicara.toLowerCase() && msg.teks.startsWith("WEBRTC_SIGNAL:ICE|")) {
            const dataIce = JSON.parse(msg.teks.split("WEBRTC_SIGNAL:ICE|")[1]);
            if (peerConnection && peerConnection.remoteDescription) {
              peerConnection.addIceCandidate(new RTCIceCandidate(dataIce)).catch(e => {});
            } else {
              iceCandidatesAntrian.push(dataIce);
            }
          }
        });
      });
    }

    function prosesAntrianIce() {
      while (iceCandidatesAntrian.length > 0 && peerConnection && peerConnection.remoteDescription) {
        const candidate = iceCandidatesAntrian.shift();
        peerConnection.addIceCandidate(new RTCIceCandidate(candidate)).catch(e => {});
      }
    }

// 1. MODIFIKASI FUNGSI AKHIRI PANGGILAN
    async function akhiriPanggilan() {
      // Jika kita yang menekan tombol "Akhiri", kirim sinyal END ke lawan bicara
      if (sedangDalamPanggilan && kontakAktif !== "") {
        panggilAPI("kirimSinyalWebRTC", [akunSaya, kontakAktif, "END", JSON.stringify({ aksi: "close" })]);
      }

      sedangDalamPanggilan = false; // Kunci agar loop data tidak membaca panggilan aktif lagi
      iceCandidatesAntrian = [];
      
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }

      document.getElementById('remote-video').srcObject = null;
      document.getElementById('local-video').srcObject = null;
      document.getElementById('call-modal').classList.add('hidden');
    }

    // 2. PERBARUI FUNGSI CEK SINYAL UNTUK MENDENGARKAN SINYAL "ANSWER" DAN "END"
    // PERBAIKAN TOTAL: Anti-Error TypeError 'setRemoteDescription' akibat Async Race Condition
    function cekSinyalBalasanMasuk() {
      // Guard 1: Jika dari awal memang sudah mati, langsung batalkan proses
      if (!sedangDalamPanggilan || !peerConnection) return;

      // 1. Pantau jika ada sinyal END masuk dari lawan bicara
      ambilSinyalTerakhirDariSheet(kontakAktif, akunSaya, "END", (dataEnd) => {
        if (dataEnd && sedangDalamPanggilan) {
          console.log("Lawan bicara memutuskan panggilan.");
          akhiriPanggilanMurniTanpaSinyal();
        }
      });

      // Guard 2: Cek ulang sebelum membaca status signalingState
      if (!peerConnection) return;

      // 2. Jika kita penelpon dan remote belum diset, cari sinyal ANSWER
      if (peerConnection.signalingState === "have-local-offer") {
        ambilSinyalTerakhirDariSheet(kontakAktif, akunSaya, "ANSWER", async (dataAnswer) => {
          // Guard 3: Verifikasi instan SEBELUM eksekusi (menghalau delay dari fungsi ambilSinyalTerakhirDariSheet)
          if (!dataAnswer || !peerConnection || !sedangDalamPanggilan) return;
          
          // Guard 4: Proteksi ganda tepat sebelum memanggil setRemoteDescription
          if (peerConnection.signalingState !== "have-local-offer") return;
          
          try {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(dataAnswer));
            prosesAntrianIce();
            DengarkanSinyalIceBerkala(kontakAktif);
          } catch (err) {
            console.warn("Sinyal ANSWER diabaikan atau penutupan berbarengan: ", err.message);
          }
        });
      }
    }

    // Fungsi pembantu baru agar tidak terjadi looping pengiriman sinyal END
    function akhiriPanggilanMurniTanpaSinyal() {
      sedangDalamPanggilan = false;
      iceCandidatesAntrian = [];
      
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null; // Di sini dialihkan menjadi null dengan aman
      }

      document.getElementById('remote-video').srcObject = null;
      document.getElementById('local-video').srcObject = null;
      document.getElementById('call-modal').classList.add('hidden');
    }

    function toggleMuteAudio() {
      if (localStream) {
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
          audioTrack.enabled = !audioTrack.enabled;
          document.getElementById('btn-mute-audio').classList.toggle('bg-red-600');
        }
      }
    }

    async function kirimPesan() {
      const input = document.getElementById('input-pesan');
      const teks = input.value.trim();
      if (teks === "" || kontakAktif === "") return;
      input.value = "";
      document.getElementById('btn-kirim').disabled = true;
      await panggilAPI("kirimPesanPribadi", [akunSaya, kontakAktif, teks]);
      document.getElementById('btn-kirim').disabled = false;
      muatPesanChat(true);
    }

    function unggahDanKirimFile(inputElement) {
      if (inputElement.files.length === 0 || kontakAktif === "") return;
      const file = inputElement.files[0];
      const ClipBtn = document.getElementById('btn-lampiran');
      ClipBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin text-emerald-600 text-xl"></i>`;
      ClipBtn.disabled = true;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const dataB64 = e.target.result.split(',')[1];
        const linkDrive = await panggilAPI("simpanFileKeDrive", [akunSaya, kontakAktif, dataB64, file.name, file.type]);
        ClipBtn.innerHTML = `<i class="fa-solid fa-paperclip text-lg"></i>`;
        ClipBtn.disabled = false;
        inputElement.value = "";
        if (linkDrive !== "Gagal") muatPesanChat(true);
      };
      reader.readAsDataURL(file);
    }

    function cekEnter(e) { if (e.key === 'Enter') kirimPesan(); }
  </script>
